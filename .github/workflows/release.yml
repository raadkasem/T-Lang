name: Release

# Tag a version (e.g. `git tag v1.4.0 && git push origin v1.4.0`) and this
# builds the app, packages a zip + DMG, signs the update with the Sparkle
# EdDSA key, generates a signed appcast, and publishes a GitHub Release.
# Users on an older version then auto-update via Sparkle.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.4.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Derive version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (version $VERSION)"

      - name: Verify Info.plist version matches tag
        run: |
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Resources/Info.plist)
          if [ "$PLIST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Info.plist version ($PLIST_VERSION) does not match tag (${{ steps.version.outputs.version }}). Bump Resources/Info.plist before tagging."
            exit 1
          fi

      - name: Build app
        run: ./build.sh

      - name: Package zip + DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ditto -c -k --sequesterRsrc --keepParent build/TLang.app "build/TLang-$VERSION.zip"
          ./scripts/make_dmg.sh

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set."
            exit 1
          fi
          GEN=$(find .build/artifacts -name generate_appcast -type f | head -1)
          [ -n "$GEN" ] || { echo "::error::generate_appcast not found"; exit 1; }
          mkdir -p dist
          cp "build/TLang-$VERSION.zip" dist/
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$GEN" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/$TAG/" \
            -o dist/appcast.xml \
            dist
          cp dist/appcast.xml build/appcast.xml
          echo "----- appcast.xml -----"
          cat build/appcast.xml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "TLang $VERSION" \
            --generate-notes \
            "build/TLang-$VERSION.zip" \
            "build/TLang-$VERSION.dmg" \
            "build/appcast.xml"
